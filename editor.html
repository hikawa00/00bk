<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>写作后台 - 我的博客</title>
    <style>
      :root {
        --bg: #f5f3ff;
        --card: #ffffff;
        --accent: #6366f1;
        --accent-soft: rgba(129, 140, 248, 0.16);
        --accent-strong: rgba(129, 140, 248, 0.28);
        --text: #111827;
        --text-soft: #6b7280;
        --border: rgba(148, 163, 184, 0.6);
        --radius-lg: 20px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 0;
        font-family: system-ui, -apple-system, "SF Pro Text", "PingFang SC",
          "Microsoft YaHei", sans-serif;
        color: var(--text);
        background: radial-gradient(
            circle at 0% 0%,
            rgba(129, 140, 248, 0.25),
            transparent 55%
          ),
          radial-gradient(
            circle at 100% 0%,
            rgba(56, 189, 248, 0.18),
            transparent 55%
          ),
          radial-gradient(
            circle at 50% 120%,
            rgba(221, 214, 254, 0.5),
            transparent 65%
          ),
          #eef2ff;
      }

      .shell {
        width: 100%;
        min-height: 100vh;
        padding: 20px 22px 18px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .shell-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
      }

      .shell-title {
        font-size: 20px;
        font-weight: 650;
        letter-spacing: 0.03em;
        color: #1f2937;
      }

      .shell-sub {
        font-size: 13px;
        color: var(--text-soft);
      }

      .shell-sub code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        background: rgba(243, 244, 246, 0.95);
        padding: 2px 4px;
        border-radius: 4px;
        border: 1px solid rgba(209, 213, 219, 0.9);
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr);
        gap: 18px;
      }

      .card {
        background: rgba(255, 255, 255, 0.98);
        border-radius: var(--radius-lg);
        border: 1px solid rgba(209, 213, 219, 0.95);
        padding: 14px 14px 12px;
      }

      .card-title {
        margin: 0 0 10px;
        font-size: 14px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #6366f1;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 8px;
      }

      .field-row {
        display: grid;
        grid-template-columns: 1.2fr 0.9fr;
        gap: 8px;
      }

      label {
        font-size: 12px;
        color: var(--text-soft);
      }

      input,
      select,
      textarea {
        width: 100%;
        border-radius: 10px;
        border: 1px solid var(--border);
        font-size: 13px;
        padding: 7px 9px;
        font-family: inherit;
        outline: none;
        transition:
          border-color 0.15s ease,
          box-shadow 0.15s ease,
          background 0.15s ease;
        background: rgba(249, 250, 251, 0.96);
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--accent);
        background: #fff;
      }

      textarea {
        resize: vertical;
        min-height: 120px;
        max-height: 260px;
      }

      .hint {
        font-size: 11px;
        color: var(--text-soft);
      }

      .format-row {
        display: flex;
        gap: 10px;
      }

      .format-option {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 12px;
        color: var(--text-soft);
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 6px;
        gap: 8px;
      }

      .btn {
        border-radius: 999px;
        padding: 7px 14px;
        font-size: 13px;
        border: 1px solid transparent;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        transition:
          background 0.15s ease,
          color 0.15s ease,
          box-shadow 0.15s ease,
          transform 0.1s ease;
      }

      .btn-primary {
        background: linear-gradient(135deg, #6366f1, #38bdf8);
        color: #f9fafb;
      }

      .btn-primary:hover {
        transform: translateY(-1px);
      }

      .btn-primary:active {
        transform: translateY(0);
      }

      .output-area {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        font-size: 12px;
        background: #020617;
        color: #e5e7eb;
        border-radius: 12px;
        padding: 10px 10px 8px;
        border: 1px solid rgba(15, 23, 42, 0.85);
      }

      .output-area textarea {
        background: transparent;
        border: none;
        color: inherit;
        padding: 0;
        min-height: 160px;
        max-height: 260px;
      }

      .output-area textarea:focus {
        box-shadow: none;
      }

      .output-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
        font-size: 11px;
        color: #9ca3af;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 11px;
        background: rgba(15, 23, 42, 0.9);
      }

      .pill span {
        color: #e5e7eb;
      }

      .pill code {
        color: #a5b4fc;
      }

      @media (max-width: 768px) {
        body {
          padding: 0;
        }

        .shell {
          padding: 14px 10px 12px;
        }

        .grid {
          grid-template-columns: minmax(0, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="shell-header">
        <div>
          <div class="shell-title">写作后台（本地）</div>
          <div class="shell-sub">
            这里只在你自己的电脑本地运行，不会把内容上传到网络。生成的代码需要手动复制进
            <code>main.js</code> 里的 <code>posts</code> 数组中。
          </div>
        </div>
      </header>

      <div class="grid">
        <section class="card">
          <h2 class="card-title">1 · 填写文章信息</h2>
          <form id="postForm">
            <div class="field-row">
              <div class="field">
                <label for="title">标题</label>
                <input id="title" name="title" required />
              </div>
              <div class="field">
                <label for="date">日期</label>
                <input id="date" name="date" type="date" required />
              </div>
            </div>

            <div class="field-row">
              <div class="field">
                <label for="id">
                  ID（选填，会自动生成）
                </label>
                <input
                  id="id"
                  name="id"
                  placeholder="为空时将自动使用英文/时间生成"
                />
                <div class="hint">
                  用于路由，例如 <code>#post=hello-blog</code>，建议用英文或拼音。
                </div>
              </div>

              <div class="field">
                <label for="category">分类</label>
                <select id="category" name="category">
                  <option value="学习">学习</option>
                  <option value="探索">探索</option>
                  <option value="欣赏">欣赏</option>
                  <option value="创作">创作</option>
                  <option value="积累">积累</option>
                </select>
              </div>
            </div>

            <div class="field">
              <label for="excerpt">摘要</label>
              <textarea
                id="excerpt"
                name="excerpt"
                rows="2"
                placeholder="这一段会显示在列表中，控制在 1～2 句话比较合适。"
              ></textarea>
            </div>

            <div class="field">
              <label>正文格式</label>
              <div class="format-row">
                <label class="format-option">
                  <input
                    type="radio"
                    name="contentFormat"
                    value="html"
                    checked
                  />
                  <span>HTML</span>
                </label>
                <label class="format-option">
                  <input type="radio" name="contentFormat" value="markdown" />
                  <span>Markdown</span>
                </label>
              </div>
            </div>

            <div class="field">
              <label for="content">
                正文
              </label>
              <textarea
                id="content"
                name="content"
                placeholder="HTML：使用 &lt;p&gt; 段落、&lt;h2&gt; 小标题、&lt;ul&gt;/&lt;ol&gt; 列表等标签&#10;Markdown：支持 # 标题、**粗体**、*斜体*、- 列表等常见语法。"
              ></textarea>
              <div class="hint">
                当选择 HTML 时，需要手动写标签；选择 Markdown 时，会在生成代码时自动转成 HTML。
              </div>
            </div>

            <div class="actions">
              <button type="submit" class="btn btn-primary">
                生成代码片段
              </button>
            </div>
          </form>
        </section>

        <section class="card output-area">
          <div class="output-header">
            <span>2 · 复制到 <code>main.js</code> 的 <code>posts</code> 里</span>
            <span class="pill">
              <span>每次生成一个对象，</span>
              <code>posts</code>
              <span>数组中记得加逗号</span>
            </span>
          </div>
          <textarea
            id="codeOutput"
            spellcheck="false"
            placeholder="// 在左侧填写完成后，这里会生成一段可直接粘贴进 posts 数组的代码。"
          ></textarea>
        </section>
      </div>
    </div>

    <script src="./editor.js"></script>
  </body>
</html>
